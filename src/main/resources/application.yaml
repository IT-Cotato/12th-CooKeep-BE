spring:
  application:
    name: cookeep

  config:
    import: optional:classpath:application-secret.yaml

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  jackson:
    time-zone: Asia/Seoul

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cache:
    type: redis

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

kakao:
  auth:
    client: ${KAKAO_CLIENT_ID}
    secret: ${KAKAO_CLIENT_SECRET}
    redirect: ${KAKAO_REDIRECT_URI}
    access-token-url: https://kauth.kakao.com/oauth/token
    user-info-url: https://kapi.kakao.com/v2/user/me
jwt:
  access-secret: ${JWT_ACCESS_SECRET_KEY}
  refresh-secret: ${JWT_REFRESH_SECRET_KEY}

google:
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-2.5-flash
  youtube:
    api-key: ${YOUTUBE_API_KEY}
  auth:
    client: ${GOOGLE_CLIENT_ID}
    secret: ${GOOGLE_CLIENT_SECRET}
    redirect: ${GOOGLE_REDIRECT_URI}
    access-token-url: https://oauth2.googleapis.com/token
    user-info-url: https://www.googleapis.com/oauth2/v2/userinfo

ai:
  recipe:
    max-change-count: 5

aws:
  s3:
    bucket: ${S3_BUCKET_NAME}
    region: ap-northeast-2
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
logging:
  level:
    org.springframework.security: DEBUG

sms:
  api-key: ${SMS_KEY}
  api-secret: ${SMS_SECRET}
  sender: ${SMS_SENDER}

otp:
  ttl-seconds: 300 # OTP 유효 시간 5분
  send-cooldown-seconds: 60 # 재전송 제한 시간 1분
  max-verify-failures: 5 # 인증 실패 허용 횟수, 초과시 잠금

vapid:
  public-key: ${VAPID_PUBLIC_KEY}
  private-key: ${VAPID_PRIVATE_KEY}

email:
  host: smtp.gmail.com
  username: ${EMAIL_USERNAME}
  password: ${EMAIL_PASSWORD}